version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: adv-rag-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-adv_rag}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: adv-rag-qdrant
    restart: always
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    container_name: adv-rag-minio
    restart: always
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    container_name: adv-rag-redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adv-rag-api
    restart: always
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-adv_rag}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-password}
      - MINIO_BUCKET=${MINIO_BUCKET:-adv-rag-docs}
      - REDIS_HOST=redis
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - NIM_BASE_URL=${NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NIM_LLM_MODEL=${NIM_LLM_MODEL}
      - NIM_EMBEDDING_MODEL=${NIM_EMBEDDING_MODEL}
      - NIM_PARSE_MODEL=${NIM_PARSE_MODEL}
    depends_on:
      - db
      - qdrant
      - minio
      - redis
    volumes:
      - ./logs:/app/logs

  neo4j:
    image: neo4j:5.26.0
    container_name: adv-rag-neo4j
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/password}
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,gds.*
    volumes:
      - neo4j_data:/data
      - neo4j_plugins:/plugins

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: adv-rag-ui
    restart: always
    ports:
      - "${FRONTEND_PORT:-5181}:5173"
    environment:
      - VITE_API_BASE_URL=http://127.0.0.1:8081
    depends_on:
      - api
      - neo4j

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  redis_data:
  neo4j_data:
  neo4j_plugins:
